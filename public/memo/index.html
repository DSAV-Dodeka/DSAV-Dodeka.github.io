<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodeka Memo Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-layout">
    <!-- Editor -->
    <div class="editor-panel">
        <h1>Dodeka Memo Generator</h1>
        <p class="subtitle">Vul de mededelingen in en download als JPG voor WhatsApp</p>

        <div class="field-group">
            <label>Memo datum (linksboven)</label>
            <input type="text" id="memo-date-input" oninput="updateMemoDate(this.value)" placeholder="bv. 25-02-2019">
        </div>

        <div id="editor-cards"></div>

        <button class="btn-download" id="download-btn" onclick="downloadMemo()">⬇ Download als JPG</button>
    </div>

    <!-- Preview -->
    <div class="preview-panel">
        <h2>Preview</h2>
        <div class="memo" id="memo-canvas">
            <!-- Decorative background image -->
            <img class="memo-deco-img" src="deco.png" alt="" />

            <div class="memo-inner">
                <!-- Hidden element to measure date text width horizontally -->
                <div id="date-measurer" aria-hidden="true" style="position:absolute;visibility:hidden;white-space:nowrap;font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:normal;">6-4-2026</div>

                <!-- Header -->
                <div class="memo-header">
                    <div class="memo-date-col">
                        <div class="memo-date-vertical" id="preview-date">6-4-2026</div>
                    </div>
                    <div class="memo-title">DODEKA<br>MEMO</div>
                </div>

                <!-- Datum line -->
                <div class="memo-datum-line">
                    <hr>
                    <span class="memo-datum-label">DATUM</span>
                </div>

                <!-- Scrollable card content area -->
                <div class="memo-content">
                    <div id="preview-cards"></div>
                    <div id="preview-fourth"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer style="text-align:center;padding:24px 0 12px;color:#999;font-size:0.8rem;font-family:'Source Sans 3',sans-serif;">
    Gemaakt door Jefry — Secretaris bestuur 4, die dit niet kon bouwen in zijn bestuursjaar, maar dit graag alsnog wilde achterlaten.
</footer>

<script src="app.js"></script>
</body>
</html>
